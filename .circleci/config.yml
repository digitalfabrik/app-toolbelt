version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.17.0
    steps:
      - checkout
      - run: npm install
      - run: npm run prettier:check
      - run: npm run build
      - run: npm run test
      - run:
          name: Check docs are up to date
          command: npm run docs:generate && git diff --exit-code docs/ mkdocs.yml

workflows:
  build_and_test:
    jobs:
      - build
